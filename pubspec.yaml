name: buritto
description: "minimalist period tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  flutter_secure_storage: ^10.3.0
  local_auth: ^3.0.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  statistics: ^1.2.1
  collection: ^1.19.1
  ml_linalg: ^13.12.7
  worker_manager: ^7.2.9
  synchronized: ^3.4.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.11.2
  build_runner: ^2.15.0
flutter:
  uses-material-design: true
  assets:
   - assets/population/
  fonts:
   - family: Shifa-Rame
     fonts:
       - asset: fonts/shifa-rame.ttf
         weight: 500
   - family: Cake-Cafe
     fonts:
       - asset: fonts/cake-cafe.ttf
         weight: 500
   - family: Hey-Comic
     fonts:
       - asset: fonts/hey-comic.ttf
         weight: 500
